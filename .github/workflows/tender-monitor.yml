name: Tender Monitor

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tender monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TENDER_PAGE_URL: ${{ vars.TENDER_PAGE_URL }}
        run: python3 tender_monitor.py

      - name: Commit seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tender_monitor_seen.json
          if git diff --cached --quiet; then
            echo "No seen-state changes."
          else
            git commit -m "Update tender monitor seen state"
            git push
          fi
